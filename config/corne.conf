# RGB underglow / per-key (27 LED na stronę: 6 underglow + 21 per-key)
CONFIG_ZMK_RGB_UNDERGLOW=y

# Wyświetlacz - shield Corne ma OLED SSD1306 zdefiniowany domyślnie
CONFIG_ZMK_DISPLAY=y

# Custom status screen (nasz override) - WYŁĄCZA built-in z ZMK
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# LVGL - włącz image widget
CONFIG_LV_USE_IMAGE=y

# Battery, output, layer widgety na centralu (działają bo ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y nie wyłącza)
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y

# BT moc
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Sleep + nazwa
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_KEYBOARD_NAME="Corne FT"

# ZMK Studio
CONFIG_ZMK_STUDIO=y

# Pointing (mysz w EXTRA layer)
CONFIG_ZMK_POINTING=y

# Eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7
